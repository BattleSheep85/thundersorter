<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Thundersorter Settings</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 500px;
      margin: 20px auto;
      padding: 0 16px;
      color: #1a1a1a;
    }
    h1 { font-size: 1.3em; }
    h2 { font-size: 1.1em; margin-top: 24px; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .status {
      margin-top: 16px;
      padding: 8px 12px;
      border-radius: 4px;
      display: none;
    }
    .status.ok { display: block; background: #e8f5e9; color: #2e7d32; }
    .status.err { display: block; background: #ffebee; color: #c62828; }
    button {
      margin-top: 8px;
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      background: #1565c0;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #0d47a1; }
    button.secondary {
      background: #607d8b;
    }
    button.secondary:hover { background: #455a64; }
    button.danger {
      background: #c62828;
      padding: 4px 10px;
      margin: 0;
      font-size: 0.85em;
    }
    button.danger:hover { background: #b71c1c; }

    .tag-list {
      list-style: none;
      padding: 0;
      margin: 8px 0;
    }
    .tag-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .tag-name {
      flex: 1;
      font-family: monospace;
      font-size: 0.95em;
    }
    .add-tag-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .add-tag-row input {
      flex: 1;
      margin: 0;
    }
    .add-tag-row button {
      margin: 0;
      flex-shrink: 0;
    }
    .hint {
      font-size: 0.85em;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Thundersorter Settings</h1>

  <label for="serviceUrl">Service URL</label>
  <input type="text" id="serviceUrl" placeholder="http://127.0.0.1:8465">

  <div style="margin-top: 12px;">
    <button id="save">Save</button>
    <button id="test" class="secondary">Test Connection</button>
  </div>

  <div id="status" class="status"></div>

  <h2>Tags</h2>
  <p class="hint">Emails will be classified into these categories.</p>
  <ul id="tagList" class="tag-list"></ul>
  <div class="add-tag-row">
    <input type="text" id="newTag" placeholder="Add a tag (e.g., invoices)">
    <button id="addTag">Add</button>
  </div>
  <div style="margin-top: 12px;">
    <button id="resetTags" class="secondary">Reset to Defaults</button>
  </div>

  <script src="options.js"></script>
</body>
</html>
