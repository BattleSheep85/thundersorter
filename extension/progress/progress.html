<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Thundersorter — Classifying</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 360px;
      margin: 0;
      padding: 20px;
      color: #1a1a1a;
      user-select: none;
    }
    h2 {
      font-size: 1.1em;
      margin: 0 0 16px 0;
    }
    .progress-bar {
      width: 100%;
      height: 20px;
      background: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%;
      background: #1565c0;
      border-radius: 10px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .stats {
      font-size: 0.9em;
      color: #555;
      margin-bottom: 4px;
    }
    .current-subject {
      font-size: 0.85em;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 16px;
      min-height: 1.2em;
    }
    .done-summary {
      display: none;
      font-size: 0.95em;
      padding: 10px 12px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    .done-summary.cancelled {
      background: #fff3e0;
      color: #e65100;
    }
    .done-summary.visible { display: block; }
    .buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    button {
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
    }
    #cancelBtn {
      background: #c62828;
      color: white;
    }
    #cancelBtn:hover { background: #b71c1c; }
    #cancelBtn:disabled {
      background: #999;
      cursor: default;
    }
    #closeBtn {
      background: #1565c0;
      color: white;
      display: none;
    }
    #closeBtn:hover { background: #0d47a1; }
  </style>
</head>
<body>
  <h2>Classifying Emails</h2>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="stats" id="stats">Preparing...</div>
  <div class="current-subject" id="currentSubject"></div>
  <div class="done-summary" id="doneSummary"></div>
  <div class="buttons">
    <button id="cancelBtn">Cancel</button>
    <button id="closeBtn">Close</button>
  </div>
  <script src="progress.js" type="module"></script>
</body>
</html>
